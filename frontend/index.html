<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alternax – Offres d'alternance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- ===== HEADER ===== -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-10 backdrop-blur-sm bg-white/95">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-gradient-to-br from-blue-500 to-blue-700 rounded-lg flex items-center justify-center shadow-sm">
          <span class="text-white font-bold text-sm">A</span>
        </div>
        <div>
          <span class="font-semibold text-gray-800 text-lg block leading-tight">Alternax</span>
          <span class="text-xs text-gray-500">Agrégateur d'offres d'alternance</span>
        </div>
      </div>
      <button
        onclick="refresh()"
        class="text-sm text-blue-600 hover:text-white hover:bg-blue-600 border border-blue-200 hover:border-blue-600 px-4 py-1.5 rounded-lg transition"
      >
        ↻ Actualiser
      </button>
    </div>
  </header>

  <!-- ===== STATS BAR ===== -->
  <div class="bg-gradient-to-r from-blue-600 to-blue-700 text-white">
    <div class="max-w-6xl mx-auto px-6 py-4 flex flex-wrap gap-6 text-sm">
      <div>
        <span class="opacity-75">Total offres</span>
        <span id="stat-total" class="ml-2 font-bold text-lg">—</span>
      </div>
      <div id="stat-sources" class="flex gap-4"></div>
      <div class="ml-auto opacity-75">
        Dernière collecte : <span id="stat-last">—</span>
      </div>
    </div>
  </div>

  <!-- ===== DASHBOARD ===== -->
  <section class="max-w-6xl mx-auto px-6 pt-6">
    <h2 class="text-xs uppercase tracking-wider text-gray-500 font-semibold mb-3">Vue d'ensemble</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">

      <div class="dashboard-card">
        <h3 class="dashboard-title">Top entreprises</h3>
        <ul id="dash-companies" class="dashboard-list"></ul>
      </div>

      <div class="dashboard-card">
        <h3 class="dashboard-title">Top localisations</h3>
        <ul id="dash-locations" class="dashboard-list"></ul>
      </div>

      <div class="dashboard-card">
        <h3 class="dashboard-title">Top technologies</h3>
        <ul id="dash-techs" class="dashboard-list"></ul>
      </div>

      <div class="dashboard-card">
        <h3 class="dashboard-title">Par source</h3>
        <ul id="dash-sources" class="dashboard-list"></ul>
      </div>

    </div>
  </section>

  <!-- ===== FILTRES ===== -->
  <div class="max-w-6xl mx-auto px-6 pt-5">
    <div class="bg-white rounded-xl border border-gray-200 p-4 flex flex-wrap gap-3 shadow-sm">
      <input
        id="search"
        type="text"
        placeholder="Titre, entreprise, mot-clé…"
        class="flex-1 min-w-48 border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
        oninput="debouncedSearch()"
      />
      <input
        id="location"
        type="text"
        placeholder="Ville, région…"
        class="w-48 border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
        oninput="debouncedSearch()"
      />
      <select
        id="source"
        class="border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
        onchange="loadOffers(1)"
      >
        <option value="">Toutes les sources</option>
      </select>
      <button
        onclick="resetFilters()"
        class="text-sm text-gray-500 hover:text-gray-800 px-3 py-2 rounded-lg hover:bg-gray-100 transition"
      >
        Réinitialiser
      </button>
    </div>

    <!-- Filtre tech actif (affiché seulement quand un tag est sélectionné) -->
    <div id="active-filters" class="mt-3 hidden items-center gap-2 text-sm">
      <span class="text-gray-500">Filtre actif :</span>
      <button id="tech-filter-chip" class="active-filter-chip" onclick="clearTechFilter()">
        <span id="tech-filter-label"></span>
        <span class="ml-1">✕</span>
      </button>
    </div>
  </div>

  <!-- ===== LISTE DES OFFRES ===== -->
  <main class="max-w-6xl mx-auto px-6 pb-12 pt-5">
    <div id="result-count" class="text-sm text-gray-500 mb-4"></div>

    <div id="offers-grid" class="grid gap-4 md:grid-cols-2">
      <!-- Offres injectées par app.js -->
    </div>

    <div id="empty-state" class="hidden text-center py-16 text-gray-400">
      <p class="text-2xl mb-2">Aucune offre trouvée</p>
      <p class="text-sm">Essayez d'élargir vos filtres</p>
    </div>

    <div id="loading" class="hidden text-center py-12">
      <div class="inline-block w-8 h-8 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="flex justify-center gap-2 mt-8"></div>
  </main>

  <script src="/static/config.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
